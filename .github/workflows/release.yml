name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Limina Mix ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build & package (Mac)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run build && npx electron-builder --mac --publish never --config electron-builder.yml

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          echo "Notarizing $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          echo "Notarization complete"

      - name: Generate checksums and latest-mac.yml (post-notarization)
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          FILENAME=$(basename "$DMG")
          VERSION="${GITHUB_REF_NAME#v}"
          SHA512=$(openssl dgst -sha512 -binary "$DMG" | base64)
          SIZE=$(stat -f%z "$DMG")
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          cat > dist/latest-mac.yml << EOF
          version: $VERSION
          files:
            - url: $FILENAME
              sha512: $SHA512
              size: $SIZE
          path: $FILENAME
          sha512: $SHA512
          releaseDate: '$DATE'
          EOF
          shasum -a 256 "$DMG" | tee dist/checksums-mac.txt

      - name: Upload Mac artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml
            dist/checksums-mac.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build & package (Windows)
        run: npm run build && npx electron-builder --win --publish never --config electron-builder.yml

      - name: Generate checksums (Windows)
        run: Get-FileHash dist\*.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Out-File -FilePath dist\checksums-win.txt -Encoding utf8

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/checksums-win.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  revalidate-changelog:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Revalidate changelog on getliminastudio
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://www.getliminastudio.com/api/revalidate \
            -H "x-revalidate-token: ${{ secrets.REVALIDATE_TOKEN }}"
