name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ github.ref_name }}
        run: |
          awk -v v="$TAG" '
            /^## / { if (found) exit; if ($0 == "## " v || index($0, "## " v " ") == 1) found=1; next }
            found { print }
          ' CHANGELOG.md > release-notes.md
          echo "--- Release notes for $TAG ---"
          cat release-notes.md

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: Limina Studio ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: prepare-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # electron-builder signs (CSC_*), runs afterSign.js to notarize via
      # notarytool (APPLE_*), builds dmg + zip, generates latest-mac.yml +
      # blockmaps, and uploads everything to the existing draft release.
      - name: Build, notarize & publish (Mac)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run publish -- --mac

  build-windows:
    needs: prepare-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish -- --win

  publish-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Un-draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}

  revalidate-changelog:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Revalidate changelog on getliminastudio
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://www.getliminastudio.com/api/revalidate \
            -H "x-revalidate-token: ${{ secrets.REVALIDATE_TOKEN }}"
