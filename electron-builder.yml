appId: com.limina.app
productName: Limina Mix
copyright: Copyright © 2025 Limina Mix

afterSign: afterSign.js

publish:
  provider: github
  owner: locii
  repo: liminastudio

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - '!node_modules/**/README*'
  - '!node_modules/**/*.md'
  - '!node_modules/**/*.map'

extraResources:
  - from: resources/creamLogo.png
    to: creamLogo.png

asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/music-metadata/**

fileAssociations:
  - ext: limina
    name: Limina Session
    description: Limina Mix Session
    role: Editor

mac:
  category: public.app-category.music
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization runs in afterSign.js — electron-builder 24.13.x's built-in
  # notarize step calls the legacy API with undefined options.
  notarize: false
  # Both targets ship: dmg for first-time install, zip for electron-updater
  # (Squirrel.Mac applies updates from a zipped .app, not from a dmg).
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  darkModeSupport: true

win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64

dmg:
  title: Limina Mix
  background: null
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
